<aside class="bg-white sticky top-0 rounded-3xl shadow-sm border border-slate-100 p-4">
  <div class="flex items-center justify-between mb-4 px-1">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-user-group text-blue-600 text-[1.1rem]"></i>
      <h2 class="font-bold text-slate-900 text-[17px]">Suggested Friends</h2>
    </div>
    <span class="bg-slate-100 text-slate-600 text-xs font-bold px-2.5 py-1 rounded-full">{{suggestList.length}}</span>
  </div>

  <div class="relative mb-4">
    <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
      <i class="fa-solid fa-magnifying-glass text-slate-400 text-sm"></i>
    </div>
    <input type="text" [(ngModel)]="searchTerm"
      class="bg-white border border-slate-200 text-slate-800 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5 placeholder-slate-400 outline-none transition-all"
      placeholder="Search friends..." aria-label="Search friends" />
  </div>
  <div class="grid gap-3 overflow-y-auto max-h-88 pb-1">

    @for (suggest of filteredList; track $index) {

    <div class="p-3 border border-slate-200 rounded-2xl bg-white hover:border-slate-300 transition-colors">
      <div class="flex items-start gap-3">
        <img [src]="suggest.photo" alt="Ahmed Bahnasy"
          class="w-11 h-11 rounded-full object-cover shrink-0 bg-slate-100 border border-slate-50" />

        <div class="flex-1 min-w-0 flex flex-col gap-2">
          <div class="flex items-center justify-between gap-2 mt-0.5">
            <div class="flex flex-col min-w-0">
              <span class="text-[14px] font-bold text-slate-900 truncate leading-tight">{{suggest.name}}</span>
              <span class="text-[13px] text-slate-500 truncate leading-tight mt-0.5">@{{suggest.username}}...</span>
            </div>


            <button (click)="followUser(suggest)" [disabled]="suggest.isFollowLoading" class="relative inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-[13px] font-semibold
         transition-all duration-200 border focus:outline-none focus:ring-2 focus:ring-blue-200" [ngClass]="{
    'bg-blue-600 text-white border-blue-600 hover:bg-blue-700 active:scale-95':
      !suggest.isFollowing && !suggest.isFollowLoading,

    'bg-white text-blue-600 border-blue-500 hover:bg-blue-50':
      suggest.isFollowing && !suggest.isFollowLoading,

    'bg-blue-100 text-blue-400 border-blue-200 cursor-not-allowed':
      suggest.isFollowLoading
  }">
              @if (suggest.isFollowLoading) {
              <i class="fa-solid fa-spinner fa-spin text-[12px]"></i>
              <span>Following...</span>
              }
              @else if (suggest.isFollowing) {
              <i class="fa-solid fa-check text-[12px]"></i>
              <span>Following</span>
              }
              @else {
              <i class="fa-solid fa-user-plus text-[12px]"></i>
              <span>Follow</span>
              }
            </button>

          </div>

          <div class="flex items-center gap-2">
            <span
              class="text-[11px] font-semibold text-slate-500 bg-slate-100/80 px-2 py-1 rounded-lg">{{suggest.followersCount}}
              followers</span>
            <span
              class="text-[11px] font-semibold text-blue-500 bg-blue-50 px-2 py-1 rounded-lg">{{suggest.mutualFollowersCount}}
              mutual</span>
          </div>
        </div>
      </div>
    </div>
    }

  </div>

  <button (click)="getSuggests()" [disabled]="isLoading || !hasMore"
    class="w-full cursor-pointer mt-3 py-2.5 bg-white border border-slate-200 rounded-xl text-[14px] font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all outline-none focus:ring-4 focus:ring-slate-100 disabled:opacity-50 disabled:cursor-not-allowed">

    @if (isLoading) {
    <i class="fa-solid fa-spinner fa-spin mr-1"></i> Loading...
    } @else if (!hasMore) {
    No More Friends
    } @else {
    View More
    }
  </button>
</aside>
