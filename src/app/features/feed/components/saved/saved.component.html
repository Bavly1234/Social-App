<app-create-post (postCreated)="getSavedPosts()"></app-create-post>

@if (postList.length === 0) {
  <div class="text-center py-10 text-slate-400">
    <i class="fa-regular fa-bookmark text-4xl mb-3 block"></i>
    <p class="font-semibold">No saved posts yet</p>
  </div>
}

@for (post of postList; track $index) {
  <app-post-card
    [post]="post"
    [userId]="userId"
    (postDeleted)="onPostDeleted($event)">
  </app-post-card>
}
